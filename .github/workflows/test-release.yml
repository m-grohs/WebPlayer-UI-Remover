name: Manual Extension Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip tagging and GitHub release?'
        required: false
        default: 'true'

jobs:
  release-extension:
    name: Build and Release Extension
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Needed to push tags & create releases

    env:
      FIREFOX_API_KEY: ${{ secrets.AMO_API_KEY }}
      FIREFOX_API_SECRET: ${{ secrets.AMO_API_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip rsync
          npm install --global web-ext

      ################################
      # Get and Possibly Override Version
      ################################

      - name: Extract version from manifest
        id: version
        run: |
          cp manifest-chrome.json manifest.json
          VERSION=$(jq -r '.version' manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Decide on release version
        id: resolve_version
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "RELEASE_VERSION=${{ steps.version.outputs.VERSION }}-test" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Apply resolved version to manifest.json
        run: |
          jq --arg v "${{ steps.resolve_version.outputs.RELEASE_VERSION }}" '.version = $v' manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      - name: Show resolved version
        run: echo "🔖 RELEASE_VERSION=${{ steps.resolve_version.outputs.RELEASE_VERSION }}"

      ################################
      # Chrome ZIP
      ################################

      - name: Prepare Chrome ZIP
        run: |
          VERSION="${{ steps.resolve_version.outputs.RELEASE_VERSION }}"
          mkdir -p build/chrome
          rsync -av --exclude 'build' ./ build/chrome/
          cd build/chrome
          zip -r "chrome-${VERSION}.zip" ./*
          mv "chrome-${VERSION}.zip" ../

      ################################
      # Firefox ZIP + XPI (signed)
      ################################

      - name: Copy Firefox manifest
        run: cp manifest-firefox.json manifest.json

      - name: Prepare Firefox ZIP
        run: |
          VERSION="${{ steps.resolve_version.outputs.RELEASE_VERSION }}"
          mkdir -p build/firefox
          rsync -av --exclude 'build' ./ build/firefox/
          cd build/firefox
          zip -r "firefox-${VERSION}.zip" ./*
          mv "firefox-${VERSION}.zip" ../

      - name: Sign Firefox extension
        if: github.event.inputs.dry_run != 'true' && env.FIREFOX_API_KEY != '' && env.FIREFOX_API_SECRET != ''
        run: |
          VERSION="${{ steps.resolve_version.outputs.RELEASE_VERSION }}"
          web-ext sign \
            --source-dir=build/firefox \
            --api-key="$FIREFOX_API_KEY" \
            --api-secret="$FIREFOX_API_SECRET" \
            --artifacts-dir=build/signed \
            --channel=listed

      ################################
      # Debugging Build Outputs
      ################################

      - name: List build directory
        run: ls -R build

      ################################
      # Git Tag (real release only)
      ################################

      - name: Commit and tag release
        if: github.event.inputs.dry_run == 'false'
        run: |
          git add manifest.json
          git commit -m "chore: release v${{ steps.version.outputs.VERSION }}" || echo "Nothing to commit"
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin HEAD
          git push origin "v${{ steps.version.outputs.VERSION }}"

      ################################
      # Changelog & Contributors
      ################################

      - name: Get last tag
        id: last_tag
        run: |
          TAG=$(git tag --sort=-creatordate | grep -v "${{ steps.resolve_version.outputs.RELEASE_VERSION }}" | head -n 1)
          echo "LAST_TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          if [ -n "${{ steps.last_tag.outputs.LAST_TAG }}" ]; then
            git log "${{ steps.last_tag.outputs.LAST_TAG }}..HEAD" --pretty=format:"- %s" > changes.txt
          else
            git log --pretty=format:"- %s" > changes.txt
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          cat changes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: List contributors
        id: contributors
        run: |
          if [ -n "${{ steps.last_tag.outputs.LAST_TAG }}" ]; then
            CONTRIBUTORS=$(git log "${{ steps.last_tag.outputs.LAST_TAG }}..HEAD" --format='%aN' | sort -u | paste -sd ", " -)
          else
            CONTRIBUTORS=$(git log --format='%aN' | sort -u | paste -sd ", " -)
          fi
          echo "CONTRIBUTORS=$CONTRIBUTORS" >> $GITHUB_OUTPUT

      - name: Print release info (dry run simulation)
        run: |
          echo "📝 Simulated Release v${{ steps.resolve_version.outputs.RELEASE_VERSION }}"
          echo ""
          echo "🔄 Changes:"
          echo "${{ steps.changelog.outputs.CHANGES }}"
          echo ""
          echo "👥 Contributors:"
          echo "${{ steps.contributors.outputs.CONTRIBUTORS }}"

      ################################
      # Create GitHub Release (real only)
      ################################

      - name: Create GitHub Release
        if: github.event.inputs.dry_run == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.CHANGES }}

            **Contributors:** ${{ steps.contributors.outputs.CONTRIBUTORS }}
          files: |
            build/**/*.zip
            build/signed/*.xpi

      ################################
      # Upload artifacts (always)
      ################################

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: |
            build/**/*.zip
            build/**/*.xpi
