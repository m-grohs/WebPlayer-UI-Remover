name: Check GitHub Secrets

on:
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          SECRET_NAMES: ${{ toJson(secrets) }}
        run: |
          echo "Available secrets (names only):"
          # Print all available secret keys (names only, values are masked)
          echo "${SECRET_NAMES}"
          
          # Example: check for specific secrets
          REQUIRED_SECRETS=("MY_SECRET" "API_KEY" "TOKEN")
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [[ "${SECRET_NAMES}" == *"$secret"* ]]; then
              echo "✅ Found secret: $secret"
            else
              echo "❌ Missing secret: $secret"
            fi
          done